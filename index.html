<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería Responsiva</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Mi sitio web responsivo</h1>

  <main>
    <figure>
      <img src="images/montana.jpg" alt="Paisaje de montaña con cielo azul">
      <figcaption>Las montañas transmiten tranquilidad y muestran la belleza de la naturaleza.</figcaption>
    </figure>

    <figure>
      <img src="images/playa.jpg" alt="Playa con arena clara y mar azul">
      <figcaption>La playa es un espacio ideal para descansar, disfrutar del mar y compartir en familia.</figcaption>
    </figure>

    <figure>
      <img src="images/bosque.jpg" alt="Bosque verde con árboles altos">
      <figcaption>Los bosques son fundamentales para el equilibrio ambiental y la vida en el planeta.</figcaption>
    </figure>

    <figure>
      <img src="images/cascada.jpg" alt="Cascada cayendo entre rocas">
      <figcaption>Las cascadas ofrecen paisajes impresionantes y representan la fuerza del agua.</figcaption>
    </figure>

    <figure>
      <img src="images/lago.jpg" alt="Lago rodeado de naturaleza">
      <figcaption>Los lagos son lugares serenos que invitan a la contemplación y al cuidado del medio ambiente.</figcaption>
    </figure>
  </main>

</body>
</html>
